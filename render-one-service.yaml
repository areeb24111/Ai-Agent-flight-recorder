# Single Web Service: API + dashboard from one Render service (no Blueprint, free tier).
# Use this by creating a Web Service manually and copying these settings, or if Render
# supports importing a single service from a YAML file.
#
# Manual setup: Dashboard → New → Web Service → connect repo → use the values below.
services:
  - type: web
    name: agent-flight-recorder
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd ../frontend && npm install && VITE_API_BASE= npm run build && mkdir -p ../backend/static && cp -r dist/* ../backend/static/
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STATIC_DIR
        value: ./static
      - key: OPENAI_API_KEY
        sync: false
      - key: API_KEY
        generateValue: true
    healthCheckPath: /health
